name: Publish
on:
  workflow_dispatch:
    branches:
      - main

permissions:
  contents: read # for checkout

jobs:
  publish:
    name: Publish
    runs-on: macos-15
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for npm provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Configure JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: bun install

      # The release script runs packages/react-native/package.json::prepublishOnly
      # which will generate these artifacts, but it does that *after* it commits
      # to git, so we don't get the Android AAR or the reference API typedoc unless
      # we generate them prior to running the release
      - name: Generate artifacts before release
        run: |
          bun run build:core
          bun run gen:reference
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
          NPM_ACCESS_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
        run: npx semantic-release
