pluginManagement {
  repositories {
    gradlePluginPortal()
    google()
    mavenCentral()
  }

  def rootNodeModules = new File(settingsDir, '../../node_modules')
  def directPluginDir = new File(rootNodeModules, '@react-native/gradle-plugin')
  if (directPluginDir.exists()) {
    includeBuild(directPluginDir.toString())
  } else {
    // Fallback for package managers that store packages in a content-addressed directory
    def bunDir = new File(rootNodeModules, '.bun')
    if (bunDir.exists()) {
      def pluginDir = bunDir.listFiles()?.find { it.name.startsWith('@react-native+gradle-plugin@') }
      if (pluginDir != null) {
        includeBuild(new File(pluginDir, 'node_modules/@react-native/gradle-plugin').toString())
      }
    }
  }
}

plugins {
  id("com.facebook.react.settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension){ ex ->
  ex.autolinkLibrariesFromCommand()
}

rootProject.name = '@notifee_tests'

include ':notifee_core'
project(':notifee_core').projectDir = new File(rootProject.projectDir, '../../android')

include ':app'
