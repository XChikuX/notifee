plugins {
  id("com.android.application")
  id("org.jetbrains.kotlin.android")
  id("com.facebook.react")
}

import com.android.build.OutputFile

def enableSeparateBuildPerCPUArchitecture = false

android {
  namespace "com.notifee.testing"
  ndkVersion rootProject.ext.ndkVersion
  compileSdkVersion rootProject.ext.compileSdkVersion

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_21
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = '17'
  }

  buildFeatures {
    buildConfig true
  }

  defaultConfig {
    applicationId "com.notifee.testing"
    minSdkVersion rootProject.ext.minSdkVersion
    targetSdkVersion rootProject.ext.targetSdkVersion
    versionCode 1
    versionName "1.0"

    testBuildType System.getProperty('testBuildType', 'debug')
    testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", "true"
  }

  splits {
    abi {
      reset()
      enable enableSeparateBuildPerCPUArchitecture
      universalApk false
      include "armeabi-v7a", "x86", "arm64-v8a", "x86_64"
    }
  }

  signingConfigs {
    staging {
      storeFile file("keystore.jks")
      storePassword "12345678"
      keyAlias "key0"
      keyPassword "12345678"
    }
    release {
      storeFile file("keystore.jks")
      storePassword "12345678"
      keyAlias "key0"
      keyPassword "12345678"
    }
  }

  buildTypes {
    debug {
      minifyEnabled false
    }
    release {
      minifyEnabled true
      proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
      proguardFile "${rootProject.projectDir}/../node_modules/detox/android/detox/proguard-rules-app.pro"
      signingConfig signingConfigs.release
    }
  }

  applicationVariants.all { variant ->
    variant.outputs.each { output ->
      def versionCodes = ["armeabi-v7a": 1, "x86": 2, "arm64-v8a": 3, "x86_64": 4]
      def abi = output.getFilter(OutputFile.ABI)
      if (abi != null) {
        output.versionCodeOverride =
          defaultConfig.versionCode * 1000 + versionCodes.get(abi)
      }
    }
  }
}

react {
  entryFile = file("../../index.js")
  reactNativeDir = file("../../node_modules/react-native")
  autolinkLibrariesWithApp()
}

dependencies {
  implementation fileTree(dir: "libs", include: ["*.jar"])
  implementation "androidx.swiperefreshlayout:swiperefreshlayout:1.1.0"

  // React Native - provides prefab artifacts for New Architecture
  implementation "com.facebook.react:react-native:0.83.4"

  androidTestImplementation 'junit:junit:4.13.2'
  androidTestImplementation 'androidx.test:runner:1.4.0'
  androidTestImplementation 'androidx.test:rules:1.4.0'
  androidTestImplementation 'androidx.test.uiautomator:uiautomator:2.2.0'
}

// Still needed for react-native-firebase integration part of tests
apply plugin: 'com.google.gms.google-services'
